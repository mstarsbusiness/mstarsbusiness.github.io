name: 自動重生 Journal 與貼文頁

# 當 CMS 發文（更新 data/posts.json）或上傳貼文圖片時自動執行
on:
  push:
    branches: [main]
    paths:
      - 'data/posts.json'
      - 'images/uploads/**'
      - 'build-journal.js'
  workflow_dispatch:   # 也可以在 Actions 分頁手動按一下執行
  schedule:
    - cron: '30 1 * * *'   # 每天台灣約 09:30 自動重生 journal，補抓任何漏掉的發文

permissions:
  contents: write

concurrency:
  group: build-journal
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取出原始碼
        uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 產生 journal.html、posts/、sitemap.xml
        run: node build-journal.js

      - name: 提交重生後的檔案（若有變更）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add journal.html sitemap.xml posts
          if git diff --cached --quiet; then
            echo "沒有變更，略過提交。"
          else
            git commit -m "chore: 自動重生 journal 與貼文頁 [skip ci]"
            git push
          fi
